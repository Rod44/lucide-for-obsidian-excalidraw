name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rebuild icon bundle from latest Lucide
        run: node scripts/build.mjs

      - name: Zip release artifact
        run: |
          cd dist
          zip -r ../lucide-for-obsidian-excalidraw.zip .

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            lucide-for-obsidian-excalidraw.zip
